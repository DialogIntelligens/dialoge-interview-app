<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialoge — Interview Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #C96A3A;
      --orange-hover: #b05a2f;
      --orange-light: #f9ede6;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8f7f5;
      --white: #ffffff;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Top nav bar */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      z-index: 10;
    }

    .topbar-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-logo span.dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--orange);
      border-radius: 50%;
    }

    /* Login card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .card-header .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--orange-light);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card-header .logo-icon svg {
      width: 24px;
      height: 24px;
      fill: var(--orange);
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(201, 106, 58, 0.12);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
    }

    .btn:hover { background: var(--orange-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a class="topbar-logo" href="/">
      Dialoge<span class="dot"></span>
    </a>
  </nav>

  <div class="card">
    <div class="card-header">
      <div class="logo-icon">
        <!-- Chat bubble icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
      </div>
      <h1>Welcome</h1>
      <p>Enter your client ID and access code to start the session.</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="chatbot-id">Client ID</label>
        <input
          type="text"
          id="chatbot-id"
          name="chatbotId"
          placeholder="Enter your client ID"
          autocomplete="off"
          autofocus
          spellcheck="false"
        />
      </div>
      <div class="form-group">
        <label for="code">Access code</label>
        <input
          type="password"
          id="code"
          name="code"
          placeholder="Enter your code"
          autocomplete="off"
        />
      </div>
      <button type="submit" class="btn" id="submit-btn">Continue</button>
    </form>

    <p class="footer-note">Powered by Dialoge</p>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');

      const chatbotId = document.getElementById('chatbot-id').value.trim();
      const code = document.getElementById('code').value.trim();

      if (!chatbotId) {
        errorMsg.textContent = 'Please enter a client ID.';
        errorMsg.classList.add('show');
        document.getElementById('chatbot-id').focus();
        return;
      }
      if (!code) {
        errorMsg.textContent = 'Please enter the access code.';
        errorMsg.classList.add('show');
        document.getElementById('code').focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chatbotId, code })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect || '/chat';
        } else {
          errorMsg.textContent = data.message || 'Invalid access code.';
          errorMsg.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Continue';
          document.getElementById('code').value = '';
          document.getElementById('code').focus();
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
