<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #111; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }
    input[type="password"]:focus { border-color: #4a7fa5; }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #4a7fa5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #3a6a8e; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .message.error { background: #fdecea; color: #c62828; border: 1px solid #f5c6c6; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #4a7fa5; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Change Password</h1>
    <p class="subtitle">Enter your current password and choose a new one.</p>
    <form id="changePasswordForm">
      <label for="oldPassword">Current password</label>
      <input type="password" id="oldPassword" name="oldPassword" placeholder="Your current password" required autocomplete="current-password" />
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" name="newPassword" placeholder="At least 6 characters" required autocomplete="new-password" />
      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat new password" required autocomplete="new-password" />
      <button type="submit" id="submitBtn">Change Password</button>
      <div class="message" id="message"></div>
    </form>
    <a class="back-link" href="/chat">← Back to chat</a>
  </div>
  <script>
    document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      msg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldPassword, newPassword, confirmPassword })
        });
        const data = await res.json();
        msg.style.display = 'block';
        if (data.success) {
          msg.className = 'message success';
          msg.textContent = 'Password changed successfully!';
          document.getElementById('changePasswordForm').reset();
        } else {
          msg.className = 'message error';
          msg.textContent = data.message || 'Something went wrong.';
        }
      } catch (err) {
        msg.style.display = 'block';
        msg.className = 'message error';
        msg.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Change Password';
      }
    });
  </script>
</body>
</html>
