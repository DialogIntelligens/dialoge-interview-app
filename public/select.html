<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialoge — Choose a chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #C96A3A;
      --orange-hover: #b05a2f;
      --orange-light: #f9ede6;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8f7f5;
      --white: #ffffff;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      z-index: 10;
    }

    .topbar-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-logo span.dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--orange);
      border-radius: 50%;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .card-header .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--orange-light);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card-header .logo-icon svg {
      width: 24px;
      height: 24px;
      fill: var(--orange);
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .bot-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bot-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      font-family: var(--font);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      width: 100%;
    }

    .bot-btn:hover {
      border-color: var(--orange);
      background: var(--orange-light);
      box-shadow: 0 0 0 3px rgba(201,106,58,0.10);
    }

    .bot-btn:active { transform: scale(0.98); }

    .bot-btn .bot-icon {
      width: 40px;
      height: 40px;
      background: var(--orange-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .bot-btn .bot-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--orange);
    }

    .bot-btn .bot-label {
      flex: 1;
    }

    .bot-btn .bot-label strong {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .bot-btn .bot-label span {
      font-size: 12px;
      color: var(--muted);
    }

    .bot-btn .bot-arrow {
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 24px;
    }

    #loading {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a class="topbar-logo" href="/">
      Dialoge<span class="dot"></span>
    </a>
  </nav>

  <div class="card">
    <div class="card-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
      </div>
      <img id="vio8-select-logo" src="/vio8-logo.png" alt="Vio8" style="display:none;height:48px;width:auto;object-fit:contain;margin-bottom:8px;">
      <h1>Choose a chatbot</h1>
      <p>Select which chatbot you'd like to interview with today.</p>
    </div>

    <div id="loading">Loading…</div>
    <div class="bot-list" id="bot-list" style="display:none;"></div>

    <p class="footer-note">Powered by Dialoge</p>
  </div>

  <script>
    async function init() {
      const session = await fetch('/api/session').then(r => r.json());
      const bots = session.chatbots || [];

        const isDafolo = session.clientName === 'dafolo' || (session.clientName && session.clientName.endsWith('@dafolo.dk'));
        if (isDafolo) {
          const logoIcon = document.querySelector('.logo-icon');
          if (logoIcon) logoIcon.style.display = 'none';
          document.getElementById('vio8-select-logo').style.display = 'block';
        }
      const loading = document.getElementById('loading');
      const list = document.getElementById('bot-list');

      if (!bots.length) {
        loading.textContent = 'No chatbots available.';
        return;
      }

      loading.style.display = 'none';
      list.style.display = 'flex';

      bots.forEach((botId, i) => {
        const btn = document.createElement('button');
        btn.className = 'bot-btn';
        const displayName = botId.charAt(0).toUpperCase() + botId.slice(1);
        btn.innerHTML = `
          <div class="bot-icon">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          </div>
          <div class="bot-label">
            <strong>${displayName}</strong>
          </div>
          <span class="bot-arrow">›</span>
        `;
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          const res = await fetch('/api/select', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chatbotId: botId })
          });
          const data = await res.json();
          if (data.success) {
            window.location.href = '/chat';
          } else {
            btn.disabled = false;
          }
        });
        list.appendChild(btn);
      });
    }

    init().catch(() => {
      window.location.href = '/';
    });
  </script>
</body>
</html>
